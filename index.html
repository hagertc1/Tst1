        const firebaseConfig = { /* your config */ };

        // ... (keep all your original data loading code) ...

        // Improved smooth auto slider
        function enableAutoSlider(elementId, speed = 1.8) {
            const slider = document.getElementById(elementId);
            if (!slider) return;
            let paused = false;
            slider.addEventListener('mouseenter', () => paused = true);
            slider.addEventListener('mouseleave', () => paused = false);

            setInterval(() => {
                if (paused) return;
                slider.scrollLeft += speed;
                if (slider.scrollLeft + slider.clientWidth >= slider.scrollWidth - 10) slider.scrollLeft = 0;
            }, 25);
        }

        enableAutoSlider("products-container");
        enableAutoSlider("testi-container");
    </script>
