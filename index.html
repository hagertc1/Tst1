<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الملابس</title>
    <!-- Tailwind CSS Stable Version -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" class="text-xl font-bold text-indigo-600 flex items-center gap-2">
                <i class="fa-solid fa-shirt"></i> متجر الملابس
            </a>
            <div class="flex items-center gap-4">
                <a href="dashboard.html" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1.5 rounded-lg transition">
                    <i class="fa-solid fa-user-gear"></i> الإدارة
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="bg-gradient-to-r line-clamp-2 from-indigo-600 to-purple-600 text-white py-12 px-4 text-center shadow-inner">
        <h1 class="text-2xl md:text-4xl font-bold mb-3">أحدث صيحات الموضة والملابس</h1>
        <p class="text-indigo-100 max-w-xl mx-auto text-xs md:text-sm leading-relaxed">اكتشف تشكيلتنا الجديدة والمميزة بأفضل الأسعار وأعلى جودة تليق بك.</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Categories Filter -->
        <div id="categories-container" class="flex gap-2 overflow-x-auto pb-4 mb-6 justify-start md:justify-center">
            <button onclick="filterCategory('all')" class="cat-btn bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-semibold shadow-sm whitespace-nowrap transition">الكل</button>
        </div>

        <!-- Products Grid -->
        <div id="products-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Loading Spinner -->
            <div id="loading" class="col-span-full text-center py-12 text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-2xl text-indigo-600 mb-2"></i>
                <p class="text-xs">جاري تحميل أحدث المنتجات...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 mt-12 py-6 text-center text-xs text-gray-400">
        <p>© 2026 متجر الملابس والأزياء. جميع الحقوق محفوظة.</p>
    </footer>

    <!-- Firebase App & Database SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // مفاتيح Firebase الخاصة بمشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyC8gv5mxQ2JaMDkQeWTpnit1CHgMh_8zL0",
            authDomain: "tricycle-for-clothes.firebaseapp.com",
            databaseURL: "https://tricycle-for-clothes-default-rtdb.firebaseio.com",
            projectId: "tricycle-for-clothes",
            storageBucket: "tricycle-for-clothes.firebasestorage.app",
            messagingSenderId: "599861767922",
            appId: "1:599861767922:web:04c16f7efc385680842a6b"
        };

        // تفعيل الـ SDK
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allProducts = [];

        // جلب البيانات لايف
        database.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const grid = document.getElementById('products-grid');
            const catContainer = document.getElementById('categories-container');
            
            grid.innerHTML = '';
            if(!data) {
                grid.innerHTML = '<div class="col-span-full text-center py-12 text-gray-400 text-xs">لا توجد منتجات معروضة حالياً. ادخل للوحة التحكم لإضافة منتجاتك!</div>';
                return;
            }

            allProducts = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            
            // تحديث الأقسام ديناميكياً
            const categories = ['all', ...new Set(allProducts.map(p => p.category))];
            catContainer.innerHTML = categories.map(cat => {
                const label = cat === 'all' ? 'الكل' : cat;
                const activeClass = cat === 'all' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50';
                return `<button onclick="filterCategory('${cat}', this)" class="cat-btn ${activeClass} px-4 py-1.5 rounded-full text-xs font-semibold shadow-sm whitespace-nowrap transition">${label}</button>`;
            }).join('');

            renderProducts(allProducts);
        });

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition duration-200 flex flex-col">
                    <div class="w-full aspect-square bg-gray-50 relative">
                        <img src="${p.image || 'https://via.placeholder.com/300?text=No+Image'}" alt="${p.title}" class="w-full h-full object-cover">
                        <span class="absolute top-2 right-2 bg-indigo-50 text-indigo-600 text-[10px] font-bold px-2 py-0.5 rounded border border-indigo-100">${p.category}</span>
                    </div>
                    <div class="p-3 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-gray-800 text-xs md:text-sm line-clamp-2 mb-1">${p.title}</h3>
                            <p class="text-gray-400 text-[11px] line-clamp-2 mb-2">${p.description || ''}</p>
                        </div>
                        <div class="flex items-center justify-between mt-2">
                            <span class="text-indigo-600 font-bold text-sm">${p.price} ج.م</span>
                            <a href="https://wa.me/201015694205?text=${encodeURIComponent('طلب شراء منتج: ' + p.title + ' بسعر: ' + p.price + ' ج.م')}" target="_blank" class="bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded-lg text-[11px] font-semibold flex items-center gap-1 transition">
                                <i class="fa-brands fa-whatsapp"></i> اطلب
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterCategory(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 px-4 py-1.5 rounded-full text-xs font-semibold shadow-sm whitespace-nowrap transition');
            if(btn) {
                btn.className = 'cat-btn bg-indigo-600 text-white px-4 py-1.5 rounded-full text-xs font-semibold shadow-sm whitespace-nowrap transition';
            }
            
            if(category === 'all') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === category);
                renderProducts(filtered);
            }
        }
    </script>
</body>
</html>
