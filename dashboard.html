<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المتجر</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">إدارة المنتجات</h1>
                <p class="text-slate-500 text-xs mt-1">أضف، عدل أو احذف الملابس من متجرك لايف</p>
            </div>
            <a href="index.html" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm px-4 py-2 rounded-xl transition flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-eye"></i> عرض المتجر
            </a>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm mb-8">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-indigo-600"></i> إضافة منتج جديد لمتجر الملابس
            </h2>
            <form id="product-form" onsubmit="saveProduct(event)" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">اسم القطعة / المنتج *</label>
                        <input type="text" id="title" required placeholder="مثال: فستان سهرة أسود، تيشرت قطن صيفي" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-indigo-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">القسم *</label>
                        <select id="category" required class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-indigo-600 bg-white">
                            <option value="ملابس رجالي">ملابس رجالي</option>
                            <option value="ملابس حريمي">ملابس حريمي</option>
                            <option value="ملابس أطفال">ملابس أطفال</option>
                            <option value="أحذية وإكسسوارات">أحذية وإكسسوارات</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">السعر (بالجنيه المصري) *</label>
                        <input type="number" id="price" required placeholder="مثال: 350" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-indigo-600">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">رابط صورة المنتج المباشر</label>
                        <input type="url" id="image" placeholder="ضع رابط الصورة المباشر هنا (ينتهي بـ .jpg أو .png)" class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm text-left focus:outline-indigo-600">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-600 mb-1">وصف قصير (اختياري)</label>
                    <textarea id="description" rows="2" placeholder="المقاسات المتاحة، نوع القماش، الألوان..." class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-indigo-600"></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition shadow-sm text-sm">
                    <i class="fa-solid fa-cloud-arrow-up"></i> حفظ ونشر على المتجر فوراً
                </button>
            </form>
        </div>

        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
            <h2 class="text-lg font-bold text-slate-800 mb-4"><i class="fa-solid fa-list-check text-indigo-600"></i> منتجاتك المعروضة حالياً</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-right text-sm">
                    <thead>
                        <tr class="bg-slate-50 border-b border-gray-100 text-slate-600 font-bold">
                            <th class="p-3">الصورة</th>
                            <th class="p-3">المنتج</th>
                            <th class="p-3">القسم</th>
                            <th class="p-3">السعر</th>
                            <th class="p-3 text-center">إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-products-list" class="divide-y divide-gray-100">
                        <tr>
                            <td colspan="5" class="text-center py-6 text-gray-400">جاري تحميل المنتجات...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // مفاتيح Firebase الخاصة بمشروعك مدمجة وجاهزة
        const firebaseConfig = {
            apiKey: "AIzaSyC8gv5mxQ2JaMDkQeWTpnit1CHgMh_8zL0",
            authDomain: "tricycle-for-clothes.firebaseapp.com",
            databaseURL: "https://tricycle-for-clothes-default-rtdb.firebaseio.com",
            projectId: "tricycle-for-clothes",
            storageBucket: "tricycle-for-clothes.firebasestorage.app",
            messagingSenderId: "599861767922",
            appId: "1:599861767922:web:04c16f7efc385680842a6b"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // جلب وعرض المنتجات للإدارة
        database.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('admin-products-list');
            
            if(!data) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">لا توجد منتجات حالياً. املأ النموذج فوق لإضافة أول منتج!</td></tr>';
                return;
            }

            tbody.innerHTML = Object.keys(data).map(key => {
                const p = data[key];
                return `
                    <tr class="hover:bg-slate-50/80 transition">
                        <td class="p-3">
                            <img src="${p.image || 'https://via.placeholder.com/50?text=No'}" class="w-10 h-10 object-cover rounded-lg border border-gray-100">
                        </td>
                        <td class="p-3 font-semibold text-slate-900">${p.title}</td>
                        <td class="p-3"><span class="bg-slate-100 text-slate-700 text-xs px-2 py-1 rounded-md font-medium">${p.category}</span></td>
                        <td class="p-3 font-bold text-indigo-600">${p.price} ج.م</td>
                        <td class="p-3 text-center">
                            <button onclick="deleteProduct('${key}')" class="bg-red-50 hover:bg-red-100 text-red-600 p-2 rounded-xl transition" title="حذف">
                                <i class="fa-solid fa-trash-can"></i> الحذف
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        });

        // حفظ منتج جديد
        function saveProduct(e) {
            e.preventDefault();
            
            const productData = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value || 'https://via.placeholder.com/300?text=No+Image',
                description: document.getElementById('description').value
            };

            database.ref('products').push(productData)
                .then(() => {
                    alert('📦 تم حفظ المنتج ونشره على المتجر بنجاح!');
                    document.getElementById('product-form').reset();
                })
                .catch((error) => {
                    alert('❌ حدث خطأ أثناء الحفظ: ' + error.message);
                });
        }

        // حذف منتج
        function deleteProduct(key) {
            if(confirm('هل أنت متأكد تماماً من حذف هذه القطعة من المتجر؟')) {
                database.ref(`products/${key}`).remove()
                    .then(() => alert('🗑️ تم الحذف بنجاح!'))
                    .catch((error) => alert('خطأ في الحذف: ' + error.message));
            }
        }
    </script>
</body>
</html>
